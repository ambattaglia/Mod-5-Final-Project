<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music To Your Ears</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <section id="landing">

       
        <nav>
            <div class="row nav__row">
                <div class="nav__logo">
                    <img class="nav__logo--img" src="./Assets/vecteezy_musical-head-phone-with-abstract-pulse-inside_.jpg" alt="logo">
                    <div class="nav__logo--title">Music To Your Ears</div>
                </div>

                <ul class="nav__link--list">
                    <li class="nav__link"><a href="#" class="nav__link--anchor link__hover-effect">Pricing</a></li>
                    <li class="nav__link"><a href="#results" class="nav__link--anchor link__hover-effect">Playlist</a></li>
                    <li class="nav__link"><a href="#" class="nav__link--anchor link__hover-effect">Sign Up</a></li>
                </ul>
            </div>
        </nav>

        
        <section class="banner">
            <img src="./Assets/banner.jpg" alt="Banner Image" class="banner__image">
        </section>

        
        <div class="container">
            <div class="row">
                <div class="header__description">

                    <h1>Life is better when <span class="purple">MUSIC</span> is part of it!</h1>

                    <div class="header__row">
                        <p class="header__para">
                            Discover <i><span class="purple fade-in">unlimited</span></i> music from your favorite artists.
                        </p>

                        <div class="input__wrapper">
                            <input type="text" placeholder="Search by Title, Artist or Genre">
                            <button class="search__btn">Search</button>
                        </div>
                    </div>

                    <div id="loading" class="loading hidden"></div>
                    <div id="results"></div>


                    
                </div> 
            </div> 
        </div> 

    </section> 

    <script src="index.js"></script>
</body>
</html>
